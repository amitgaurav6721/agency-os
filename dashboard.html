<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Onboarding Form | DevAgency</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 650px; background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 40px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .brand { font-size: 26px; font-weight: 700; color: #3b82f6; text-align: center; margin-bottom: 10px; }
        .brand span { color: #fff; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; background-color: #0b0f19; border: 1px solid #1e293b; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: all 0.3s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-submit { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #2563eb; }
        
        /* Success Box Style */
        .success-box { display: none; background-color: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 12px; padding: 30px; text-align: center; margin-top: 20px; }
        .success-box h3 { color: #10b981; font-size: 22px; margin-bottom: 15px; }
        .id-badge { background-color: #1e293b; color: #3b82f6; font-size: 24px; font-weight: 700; padding: 10px 20px; border-radius: 8px; display: inline-block; margin-bottom: 15px; letter-spacing: 1px; border: 1px solid #3b82f6; }
        .success-box p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">Dev<span>Agency</span></div>
        <p class="subtitle">Tell us about your project requirements to get started.</p>

        <form id="requestForm">
            <div class="row-inputs">
                <div class="form-group">
                    <label for="clientName">Your Full Name</label>
                    <input type="text" id="clientName" placeholder="e.g., John Doe" required>
                </div>
                <div class="form-group">
                    <label for="whatsappNumber">WhatsApp Number (with Country Code)</label>
                    <input type="tel" id="whatsappNumber" placeholder="e.g., +919876543210" required>
                </div>
            </div>

            <div class="form-group">
                <label for="title">Project / Requirement Title</label>
                <input type="text" id="title" placeholder="e.g., Build a Portfolio Website for my agency" required>
            </div>

            <div class="form-group">
                <label for="type">Project Type</label>
                <select id="type">
                    <option>Custom HTML/CSS Website</option>
                    <option>WordPress Website</option>
                    <option>E-commerce Feature/Update</option>
                    <option>UI Design / Revision</option>
                </select>
            </div>

            <div class="form-group">
                <label for="desc">Detailed Description & Guidelines</label>
                <textarea id="desc" rows="5" placeholder="Describe color themes, reference website links, page structure, etc..." required></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Submit Requirements</button>
        </form>

        <div class="success-box" id="successBox">
            <h3>🎉 Order Placed Successfully!</h3>
            <p style="color: #fff; margin-bottom: 10px;">Your Unique Tracking ID is:</p>
            <div class="id-badge" id="displayId">REQ-XXXX</div>
            <p>Please save this ID. A confirmation message has been triggered to your WhatsApp number. You can use this ID anytime to track your project status.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('requestForm');
        const successBox = document.getElementById('successBox');
        const displayId = document.getElementById('displayId');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Button text change loading state dikhane ke liye
            submitBtn.innerText = "Submitting to Cloud...";
            submitBtn.disabled = true;

            const clientName = document.getElementById('clientName').value;
            const whatsappNumber = document.getElementById('whatsappNumber').value;
            const title = document.getElementById('title').value;
            const projectType = document.getElementById('type').value;
            const description = document.getElementById('desc').value;
            
            try {
                const response = await fetch('https://agency-os-phkc.onrender.com/api/requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientName, whatsappNumber, title, projectType, description })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Form chhupao aur Unique ID wala success card dikhao
                    form.style.display = 'none';
                    displayId.innerText = data.requestId;
                    successBox.style.display = 'block';
                } else {
                    alert('Error: Server failed to process submission.');
                    resetButton();
                }
            } catch (error) {
                console.error('Submission Error:', error);
                alert('Connection Error: Unable to reach the live database.');
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.innerText = "Submit Requirements";
            submitBtn.disabled = false;
        }
    </script>
</body>
</html>
