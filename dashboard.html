<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | DevAgency</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background-color: #0f172a; border-right: 1px solid #1e293b; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar .brand { font-size: 22px; font-weight: 700; color: #3b82f6; margin-bottom: 40px; padding-left: 10px; }
        .sidebar .brand span { color: #fff; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; font-weight: 500; transition: all 0.3s; }
        .sidebar a.active, .sidebar a:hover { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header-dash { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .user-info h2 { font-size: 28px; font-weight: 700; }
        .user-info p { color: #94a3b8; font-size: 14px; }
        .status-badge { background-color: rgba(16, 185, 129, 0.1); color: #10b981; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2); }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 30px; }
        .card h3 { margin-bottom: 20px; font-size: 20px; color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background-color: #0b0f19; border: 1px solid #1e293b; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #3b82f6; }
        .btn-submit { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background-color: #2563eb; }
        .ticket-list { display: flex; flex-direction: column; gap: 15px; }
        .ticket-item { background-color: #0b0f19; border: 1px solid #1e293b; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-info h4 { font-size: 15px; margin-bottom: 40px; color: #fff; }
        .ticket-info span { color: #64748b; font-size: 12px; }
        .badge-progress { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">Dev<span>Agency</span></div>
        <a href="#" class="active">Dashboard</a>
        <a href="#">Active Projects</a>
        <a href="#">Billing & Plans</a>
        <a href="#">Account Settings</a>
    </div>

    <div class="main-content">
        <div class="header-dash">
            <div class="user-info">
                <h2>Welcome Back, Client!</h2>
                <p>Manage your website development requests below.</p>
            </div>
            <div class="status-badge">Half-Yearly Plan Active</div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Submit a New Web Request</h3>
                <form id="requestForm">
                    <div class="form-group">
                        <label for="title">Request Title</label>
                        <input type="text" id="title" placeholder="e.g., Build a new Landing Page for Product X" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Project Type</label>
                        <select id="type">
                            <option>Custom HTML/CSS Website</option>
                            <option>WordPress Website</option>
                            <option>E-commerce Feature/Update</option>
                            <option>UI Design / Revision</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="desc">Detailed Description & Guidelines</label>
                        <textarea id="desc" rows="6" placeholder="Provide color preferences, content structure, or layout details..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Submit Request</button>
                </form>
            </div>

    <script>
        const form = document.getElementById('requestForm');
        const queueList = document.querySelector('.ticket-list');

        // FUNCTION 1: Database se data laakar screen par dikhana
        async function fetchActiveQueue() {
            try {
                const res = await fetch('https://agency-os-phkc.onrender.com/api/requests');
                const result = await res.json();
                
                if (result.success && result.data.length > 0) {
                    queueList.innerHTML = ''; // Purana nakli data saaf karne ke liye
                    
                    result.data.forEach(ticket => {
                        // Har ek entry ke liye naya card banana
                        const ticketItem = document.createElement('div');
                        ticketItem.className = 'ticket-item';
                        
                        // Status ke hisaab se badge ka color badalna
                        let badgeStyle = "background: rgba(245, 158, 11, 0.1); color: #f59e0b;"; // Pending/In Progress
                        if (ticket.status === 'Live') {
                            badgeStyle = "background: rgba(16, 185, 129, 0.1); color: #10b981;";
                        }

                        ticketItem.innerHTML = `
                            <div class="ticket-info">
                                <h4>${ticket.title}</h4>
                                <span>Type: ${ticket.projectType}</span>
                            </div>
                            <div class="badge-progress" style="${badgeStyle}">${ticket.status || 'Pending'}</div>
                        `;
                        queueList.appendChild(ticketItem);
                    });
                }
            } catch (err) {
                console.error('Queue Fetch Error:', err);
            }
        }

        // Page khulte hi automatic saari requests load ho jayein
        document.addEventListener('DOMContentLoaded', fetchActiveQueue);

        // FUNCTION 2: Naya form submit karne ka logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const projectType = document.getElementById('type').value;
            const description = document.getElementById('desc').value;
            
            try {
                const response = await fetch('https://agency-os-phkc.onrender.com/api/requests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, projectType, description })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('🎉 Success: Your web request has been submitted!');
                    form.reset();
                    fetchActiveQueue(); // Form submit hote hi bina reload ke list refresh ho jaye
                } else {
                    alert('Error: Server failed to save.');
                }
            } catch (error) {
                console.error('Submission Error:', error);
                alert('Success: Local environment fallback trigger!');
                form.reset();
                setTimeout(fetchActiveQueue, 1500); // Back up reload trigger
            }
        });
    </script>
</body>
</html>
